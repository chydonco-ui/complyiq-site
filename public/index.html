<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ComplyIQ – The Regulatory Operating System for Nigeria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>



 /* --------------------------------------------------
   1. ROOT VARIABLES
-------------------------------------------------- */
:root {
      --primary: #ff4d8d;
      --primary-dark: #d40062;
      --bg: #12071f;
      --card: #1e0f33;
      --text: #ffffff;
      --muted: #c9b3ff;
      --accent: #00e6b8;
      --danger: #ff8a00;
      --hero-gradient: linear-gradient(135deg, #ff4d8d, #8a2be2);
}

/* --------------------------------------------------
   2. GLOBAL RESET + BASE
-------------------------------------------------- */
* {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
}

body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a1030 0, #0b0618 45%, #000 100%);
      color: var(--text);
      line-height: 1.6;
}

a {
      color: inherit;
      text-decoration: none;
}

.page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 64px;
}

/* --------------------------------------------------
   3. HEADER + NAVIGATION
-------------------------------------------------- */
header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 0 24px;
}

.logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 14px;
}

.logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: conic-gradient(from 180deg, #22c55e, #0ea5e9, #0b5cff, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
}

nav {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: var(--muted);
}

.nav-link:hover {
      color: var(--text);
}

/* --------------------------------------------------
   4. BUTTONS
-------------------------------------------------- */
.btn {
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease-out;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
}

.btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
}

.btn-outline {
      background: transparent;
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
}

.btn-outline:hover {
      border-color: var(--primary);
      color: white;
}

/* Hero-specific buttons */
.btn-primary {
      background: var(--accent);
      color: #1a0b2e;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: 0.25s ease;
}

.btn-primary:hover {
      background: #00f5cc;
      transform: translateY(-2px);
}

.btn-secondary {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: 0.25s ease;
}

.btn-secondary:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
}

/* --------------------------------------------------
   5. HERO SECTION
-------------------------------------------------- */
.hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      padding: 80px 40px;
      align-items: center;
      background: var(--hero-gradient);
      color: white;
      border-radius: 12px;
}

@media (max-width: 900px) {
      .hero {
            grid-template-columns: 1fr;
            text-align: center;
      }
}

.hero-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      max-width: 520px;
      margin: 0 auto;
}

.hero-kicker {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 10px;
}

.hero-title {
      font-size: clamp(32px, 4vw, 40px);
      font-weight: 700;
      margin-bottom: 12px;
}

.hero-title span {
      background: linear-gradient(120deg, #60a5fa, #22c55e);
      -webkit-background-clip: text;
      color: transparent;
}

.hero-sub {
      font-size: 15px;
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto 20px auto;
}

.hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
}

.hero-meta {
      font-size: 12px;
      color: var(--muted);
}

.hero-card {
      background: radial-gradient(circle at top left, #2a1450 0%, #12071f 70%);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 22px 50px rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 360px;
      margin: 0 auto;
}

.hero-card-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
}

.hero-metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
}

.hero-metric-row:last-child {
      border-bottom: none;
}

.hero-metric-label {
      color: var(--muted);
}

.hero-metric-value {
      font-weight: 600;
      color: var(--accent);
}

.pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(0,230,184,0.12);
      color: #8ffce0;
      font-size: 11px;
      font-weight: 500;
}

/* --------------------------------------------------
   6. PROBLEM + SOLUTION SECTIONS
-------------------------------------------------- */
.section-grid {
      display: grid;
      gap: 32px;
      margin-top: 80px;
}

.card {
      background: var(--card);
      padding: 32px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
}

.section-kicker {
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 12px;
}

.section-title {
      font-size: clamp(26px, 4vw, 34px);
      font-weight: 700;
      margin-bottom: 16px;
}

.section-title span {
      background: linear-gradient(120deg, #ff4d8d, #8a2be2);
      -webkit-background-clip: text;
      color: transparent;
}

.muted {
      color: var(--muted);
      margin-bottom: 24px;
}

.card ul {
      list-style: none;
      padding: 0;
      display: grid;
      gap: 14px;
}

.card li {
      display: flex;
      gap: 10px;
      font-size: 15px;
      line-height: 1.5;
}

.bullet {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-top: 6px;
}

/* --------------------------------------------------
   7. HOW IT WORKS
-------------------------------------------------- */
#how-it-works {
      margin-top: 80px;
}

.how-list {
      list-style: none;
      padding: 0;
      margin: 32px 0 0;
      display: grid;
      gap: 20px;
}

.how-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      padding: 18px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 15px;
      line-height: 1.5;
}

.how-list strong {
      color: var(--accent);
      font-weight: 600;
      font-size: 15px;
}

/* --------------------------------------------------
   8. TAGS (Customers section)
-------------------------------------------------- */
.tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
}

.tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #1f2937;
      color: var(--muted);
}

/* --------------------------------------------------
   9. FOOTER
-------------------------------------------------- */
footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #111827;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
}
